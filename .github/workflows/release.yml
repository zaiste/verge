name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Builds the tarball and gates it: unit + shim protocol tests on the tagged
  # ref, then tests of the artifact itself (dlopen on old glibc, packaged
  # runtime boots and speaks the protocol). Nothing publishes unless all pass.
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0   # package-release.sh derives the version from tags
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - name: Build release tarball
        run: tools/package-release.sh
      - name: Gate - shim protocol tests
        run: make check-shim
      - name: Gate - runtime typecheck and tests
        run: |
          cd runtime && bun install --frozen-lockfile && bun run typecheck
          cd .. && bun test
      - name: Gate - artifact loads on old glibc
        run: |
          mkdir pkg && tar -xzf verge-*.tar.gz -C pkg
          zig cc -target x86_64-linux-gnu.2.17 -o load_test tests/shim/load_test.c -ldl
          for image in centos:7 debian:10 debian:11 ubuntu:20.04 rockylinux:8; do
            echo "--- $image"
            docker run --rm -v "$PWD:/w" -w /w "$image" ./load_test pkg/verge.x64.so
          done
      - name: Gate - packaged runtime boots and sends hello
        run: bun tests/release-smoke.ts "$PWD/pkg"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-tarball
          path: |
            verge-*.tar.gz
            SHA256SUMS
          retention-days: 1

  publish:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write   # only this job publishes
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-tarball
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 ||
            gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes
          gh release upload "$TAG" verge-*.tar.gz SHA256SUMS --repo "$REPO" --clobber
