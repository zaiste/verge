name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-so:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Build shared library
        run: make so

  runtime:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: cd runtime && bun install
      - name: Typecheck
        run: cd runtime && bun run typecheck
      - name: Test
        run: bun test
      - name: Bundle
        run: cd runtime && bun run bundle
