name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least privilege: nothing here needs to write to the repository.
permissions:
  contents: read

# A newer push supersedes an in-flight run of the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      # Native build: the runner's gcc is the strictest warning check we get.
      - name: Build with gcc
        run: make so
      # Shipping build: pins the glibc floor so the runner image can move
      # without silently raising the requirement on servers.
      - name: Build with the release toolchain
        run: make clean && tools/build-shim.sh

  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install dependencies
        run: cd runtime && bun install --frozen-lockfile
      - name: Typecheck
        run: cd runtime && bun run typecheck
      - name: Test
        run: bun test
      - name: Bundle
        run: cd runtime && bun run bundle
