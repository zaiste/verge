name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least privilege: nothing here needs to write to the repository.
permissions:
  contents: read

# A newer push supersedes an in-flight run of the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      # Native build: the runner's gcc is the strictest warning check we get.
      - name: Build with gcc
        run: make so
      # Drives the real IPC layer against a real sidecar, engine stubbed.
      - name: Test the shim protocol
        run: make check-shim
      # Shipping build: pins the glibc floor so the runner image can move
      # without silently raising the requirement on servers.
      - name: Build with the release toolchain
        run: make clean && tools/build-shim.sh
      - name: Build the portability loader
        run: zig cc -target x86_64-linux-gnu.2.17 -o bin/load_test tests/shim/load_test.c -ldl
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shim
          path: |
            bin/verge.x64.so
            bin/load_test
          retention-days: 1

  # Proves the shipped library actually loads on the older distributions
  # servers run, rather than trusting the symbol-version floor alone. Uses
  # docker instead of `container:` so these images never have to host the
  # Actions runner's Node.
  portability:
    needs: shim
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: shim
      - name: Load the shim on old glibc
        run: |
          chmod +x load_test
          for image in debian:10 debian:11 ubuntu:20.04 rockylinux:8; do
            echo "--- $image"
            docker run --rm -v "$PWD:/w" -w /w "$image" ./load_test verge.x64.so
          done

  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install dependencies
        run: cd runtime && bun install --frozen-lockfile
      - name: Typecheck
        run: cd runtime && bun run typecheck
      - name: Test
        run: bun test
      - name: Bundle
        run: cd runtime && bun run bundle
